name: ethyleen
description: Food freshness monitoring app — know when your food is going bad.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.0
  firebase_database: ^10.4.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  flutter_local_notifications: 18.0.1
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
